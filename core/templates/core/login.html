<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – AssistFlow</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif}
  .box{background:#1a1d27;border:1px solid #2d3250;border-radius:12px;padding:40px;width:360px}
  .logo{text-align:center;font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:8px}
  .logo span{color:#6c63ff}
  p{text-align:center;color:#8892b0;font-size:.88rem;margin-bottom:25px}
  label{display:block;font-size:.82rem;color:#8892b0;margin-bottom:5px}
  input{background:#22263a;border:1px solid #2d3250;color:#e2e8f0;padding:10px 12px;border-radius:6px;width:100%;font-size:.9rem;margin-bottom:14px}
  input:focus{outline:none;border-color:#6c63ff}
  button{background:#6c63ff;color:#fff;border:none;padding:11px;border-radius:6px;width:100%;font-size:.95rem;cursor:pointer;font-weight:600;margin-top:4px}
  button:hover{opacity:.85}
  .err{background:#2d1a1a;color:#ff6b6b;border:1px solid #ff6b6b;padding:10px;border-radius:6px;font-size:.85rem;margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Help<span>Desk</span></div>
  <p>Sign in to your account</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
